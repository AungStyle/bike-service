<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารงานเซอร์วิสรายเดือน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fas fa-car-side text-3xl text-indigo-400"></i>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Monthly Car Service Dashboard</h1>
                    <p class="text-xs text-slate-400">ระบบติดตามสถานะรถยนต์รายเดือน</p>
                </div>
            </div>
            
            <div class="relative w-full md:w-96">
                <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="ค้นหา ทะเบียน, รุ่นรถ, เลข VIN หรือช่าง..." 
                    class="w-full bg-slate-800 border-none rounded-full py-2 px-10 focus:ring-2 focus:ring-indigo-500 text-sm">
                <i class="fas fa-search absolute left-4 top-3 text-slate-500 text-xs"></i>
            </div>

            <button onclick="loadData()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> อัปเดตข้อมูล
            </button>
        </div>
    </nav>

    <div id="loadingStatus" class="text-center py-4 text-slate-500 animate-pulse">กำลังดึงข้อมูลงานทั้งเดือน...</div>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="flex flex-col h-full">
                <div class="bg-blue-600 p-3 rounded-t-xl text-white font-bold flex justify-between items-center">
                    <span><i class="far fa-calendar-alt mr-2"></i> คิวรอนัดหมาย (TODO)</span>
                    <span id="count-todo" class="bg-white/20 px-2 py-0.5 rounded-md text-xs">0</span>
                </div>
                <div id="todo-list" class="bg-blue-50/50 p-4 rounded-b-xl border-x border-b border-blue-100 space-y-4 min-h-[70vh] content-start"></div>
            </div>

            <div class="flex flex-col h-full">
                <div class="bg-amber-500 p-3 rounded-t-xl text-white font-bold flex justify-between items-center">
                    <span><i class="fas fa-tools mr-2"></i> กำลังดำเนินการ (DOING)</span>
                    <span id="count-doing" class="bg-white/20 px-2 py-0.5 rounded-md text-xs">0</span>
                </div>
                <div id="doing-list" class="bg-amber-50/50 p-4 rounded-b-xl border-x border-b border-amber-100 space-y-4 min-h-[70vh] content-start"></div>
            </div>

            <div class="flex flex-col h-full">
                <div class="bg-emerald-600 p-3 rounded-t-xl text-white font-bold flex justify-between items-center">
                    <span><i class="fas fa-check-circle mr-2"></i> เสร็จเรียบร้อย (DONE)</span>
                    <span id="count-done" class="bg-white/20 px-2 py-0.5 rounded-md text-xs">0</span>
                </div>
                <div id="done-list" class="bg-emerald-50/50 p-4 rounded-b-xl border-x border-b border-emerald-100 space-y-4 min-h-[70vh] content-start"></div>
            </div>

        </div>
    </main>

    <script>
        // 🛑 วางลิงก์ API ของคุณที่นี่
        const API_URL = "https://script.google.com/macros/s/AKfycbyo76Aq5jtqOUcrHeu71OCipAYmvmzNgSNAEy1xRnltsbMQdMnZIaq4bU-I12vkbklJBw/exec";

        async function loadData() {
            const loading = document.getElementById('loadingStatus');
            loading.classList.remove('hidden');
            
            const lists = {
                todo: document.getElementById('todo-list'),
                doing: document.getElementById('doing-list'),
                done: document.getElementById('done-list')
            };

            Object.values(lists).forEach(el => el.innerHTML = '');

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                let counts = { todo: 0, doing: 0, done: 0 };

                data.forEach(item => {
                    const status = item.status.toLowerCase().trim();
                    if (lists[status]) {
                        counts[status]++;
                        const card = createCard(item);
                        lists[status].appendChild(card);
                    }
                });

                document.getElementById('count-todo').innerText = counts.todo;
                document.getElementById('count-doing').innerText = counts.doing;
                document.getElementById('count-done').innerText = counts.done;
                
                loading.classList.add('hidden');
            } catch (error) {
                loading.innerText = "❌ โหลดข้อมูลไม่สำเร็จ กรุณาเช็กการตั้งค่า API";
                console.error(error);
            }
        }

        function createCard(item) {
            const div = document.createElement('div');
            div.className = "card-item bg-white rounded-xl shadow-md border border-slate-200 p-4 hover:shadow-lg transition-all duration-300";
            
            const mechanic = item.mechanic || "ไม่ระบุช่าง";
            const vin = item.vin || "ไม่ระบุ VIN";
            
            div.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-slate-100 text-slate-700 text-[10px] font-bold px-2 py-1 rounded">
                        <i class="far fa-clock mr-1 text-indigo-500"></i> ${item.date} | ${item.time}
                    </div>
                    <span class="text-[10px] text-slate-400 font-mono">VIN: ${vin}</span>
                </div>
                
                <h3 class="font-bold text-slate-800 text-base mb-1">${item.plate || 'ไม่ระบุทะเบียน'}</h3>
                <p class="text-indigo-600 font-semibold text-sm mb-2"><i class="fas fa-motorcycle mr-1"></i> ${item.model}</p>
                
                <div class="bg-slate-50 p-2 rounded-lg mb-3">
                    <p class="text-xs text-slate-500 leading-relaxed italic">"${item.service}"</p>
                </div>
                
                <div class="flex items-center justify-between mt-4 pt-3 border-t border-slate-100">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-[10px]">
                            <i class="fas fa-user-wrench"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-700">${mechanic}</span>
                    </div>
                </div>
            `;
            return div;
        }

        function filterCards() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('card-item');
            
            for (let card of cards) {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(input) ? "block" : "none";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
